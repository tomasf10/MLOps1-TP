x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: dockerfiles/airflow/Dockerfile
  image: diabetes-tp-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "tp-mlops-local-secret"
    DATASET_PATH: ${DATASET_PATH:-/opt/project/data/raw/diabetes_dataset.csv}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./data:/opt/project/data
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - backend

services:
  postgres:
    image: postgres:16
    container_name: tp_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops} -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  airflow-init:
    <<: *airflow-common
    container_name: tp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-airflow} \
          --firstname TP \
          --lastname MLOps \
          --role Admin \
          --email airflow@example.com \
          --password ${AIRFLOW_PASSWORD:-airflow} || true

  airflow-webserver:
    <<: *airflow-common
    container_name: tp_airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: tp_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
