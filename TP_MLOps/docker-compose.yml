x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: dockerfiles/airflow/Dockerfile
  image: diabetes-tp-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "tp-mlops-local-secret"
    DATASET_PATH: ${DATASET_PATH:-/opt/project/data/raw/diabetes_dataset.csv}
    MODEL_OUTPUT_PATH: ${MODEL_OUTPUT_PATH:-/opt/project/artifacts/model.joblib}
    METRICS_OUTPUT_PATH: ${METRICS_OUTPUT_PATH:-/opt/project/artifacts/metrics.json}
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-diabetes-tp-mlops}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./data:/opt/project/data
    - ./artifacts:/opt/project/artifacts
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_healthy
  networks:
    - backend

services:
  postgres:
    image: postgres:16
    container_name: tp_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: airflow,mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dockerfiles/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: tp_minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  create-buckets:
    image: minio/mc:latest
    container_name: tp_create_buckets
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME:-mlflow}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MLFLOW_BUCKET_NAME};
      mc anonymous set download local/$${MLFLOW_BUCKET_NAME};
      "
    networks:
      - backend

  mlflow:
    build:
      context: .
      dockerfile: dockerfiles/mlflow/Dockerfile
    image: diabetes-tp-mlflow:latest
    container_name: tp_mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/mlflow
      --default-artifact-root s3://${MLFLOW_BUCKET_NAME:-mlflow}/
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend

  airflow-init:
    <<: *airflow-common
    container_name: tp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-airflow} \
          --firstname TP \
          --lastname MLOps \
          --role Admin \
          --email airflow@example.com \
          --password ${AIRFLOW_PASSWORD:-airflow} || true

  airflow-webserver:
    <<: *airflow-common
    container_name: tp_airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: tp_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
